# cloud-init for a manually created Multipass VM. bootstrap.sh generates
# its own copy of this with the real key, so this file is only needed for
# the manual path. Replace the key line with the contents of jenkins_key.pub.
#
#   multipass launch 22.04 --name petclinic-prod --cpus 2 --memory 2G \
#       --disk 10G --cloud-init devsecops/vm/multipass-cloud-init.yml

users:
  - default
  - name: ubuntu
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICEvdkL2qq2qtw3RLK7A+MJnRSecJFwyAvmjqR/M2dM9 jenkins-deploy
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
