# Loads every dashboard JSON found in /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: DevSecOps dashboards
    orgId: 1
    folder: Jenkins
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
