# DevSecOps pipeline infrastructure for spring-petclinic
#
# Brings up Jenkins, SonarQube, Prometheus, Grafana and OWASP ZAP on a
# custom bridge network (devsecops-net) so every service can reach the
# others by container name (http://sonarqube:9000, http://zap:8090, ...).
#
# Usage (from the devsecops/ directory):
#   docker compose up -d --build
#
# The production web server is NOT part of this compose file on purpose:
# per the assignment it is a separate VM, provisioned with Vagrant (or
# Multipass on Apple Silicon) and deployed to with Ansible from Jenkins.

name: petclinic-devsecops

networks:
  devsecops-net:
    name: devsecops-net
    driver: bridge

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  prometheus_data:
  grafana_data:

services:
  jenkins:
    build: ./jenkins
    image: petclinic/jenkins:devsecops
    container_name: jenkins
    restart: unless-stopped
    ports:
      # Host port 8081 (8080 is often taken - e.g. by other containers or
      # local apps). Inside devsecops-net Jenkins is still jenkins:8080.
      - "8081:8080"   # Jenkins UI -> http://localhost:8081
      - "50000:50000" # inbound agents (not used, but standard)
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - devsecops-net

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      # Skips Elasticsearch bootstrap checks (vm.max_map_count) for a dev setup
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - devsecops-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - devsecops-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - devsecops-net

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap
    restart: unless-stopped
    # Run ZAP as a long-lived daemon with its REST API open to the
    # devsecops network. The Jenkins pipeline drives scans through this
    # API (spider -> passive/active scan -> HTML report).
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8090
      -config api.disablekey=true
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    ports:
      - "8090:8090"
    # The image's built-in healthcheck probes ZAP's default port 8080;
    # we run the daemon on 8090, so probe that instead.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - devsecops-net
