# Overlay for the fully automated setup. Only bootstrap.sh uses this file.
# It disables the Jenkins setup wizard and applies jenkins/casc.yaml,
# with values coming from the .env file that bootstrap.sh writes.
#
#   docker compose -f docker-compose.yml -f docker-compose.auto.yml up -d

services:
  jenkins:
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      CASC_JENKINS_CONFIG: /var/jenkins_config/casc.yaml
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      SONAR_TOKEN: ${SONAR_TOKEN}
      PROD_HOST_OVERRIDE: ${PROD_HOST}
      REPO_URL: ${REPO_URL}
    volumes:
      - ./jenkins/casc.yaml:/var/jenkins_config/casc.yaml:ro
    secrets:
      - prod_vm_key

secrets:
  prod_vm_key:
    file: ./vm/jenkins_key
