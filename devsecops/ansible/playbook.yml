---
- name: Deploy Spring PetClinic to production
  hosts: production
  become: true
  vars:
    deploy_dir: /opt/petclinic
    app_user: deploy
    jar_src: "{{ workspace }}/target/spring-petclinic-4.0.0-SNAPSHOT.jar"

  tasks:
    - name: ensure deploy directory exists
      file:
        path: "{{ deploy_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: stop service before replacing jar
      systemd:
        name: petclinic
        state: stopped
      ignore_errors: true

    - name: copy application jar
      copy:
        src: "{{ jar_src }}"
        dest: "{{ deploy_dir }}/spring-petclinic.jar"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: install systemd unit file
      template:
        src: templates/petclinic.service.j2
        dest: /etc/systemd/system/petclinic.service
        mode: "0644"

    - name: reload systemd and start petclinic
      systemd:
        name: petclinic
        state: started
        enabled: true
        daemon_reload: true

    - name: wait for app to be ready
      uri:
        url: http://localhost:8080
        status_code: 200
      register: result
      until: result.status == 200
      retries: 15
      delay: 10
