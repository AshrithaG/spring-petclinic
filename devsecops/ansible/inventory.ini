# Production web server (the VM provisioned in devsecops/vm/).
#
# CHANGE ansible_host to your VM's IP address:
#   - Vagrant/VirtualBox: 192.168.56.10 (set in the Vagrantfile)
#   - Multipass (Apple Silicon): run `multipass info petclinic-prod` and
#     use the IPv4 shown (e.g. 192.168.64.x); ansible_user is 'ubuntu'
#
# The SSH private key is supplied by Jenkins through ssh-agent
# (credential ID 'prod-vm-ssh' in the Jenkinsfile), so no key path is
# needed here.

[prod]
petclinic-prod ansible_host=192.168.252.2 ansible_user=ubuntu

[prod:vars]
ansible_ssh_common_args=-o StrictHostKeyChecking=no
