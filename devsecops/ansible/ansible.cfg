# Ansible defaults for deployments run from inside the Jenkins container.
[defaults]
inventory = inventory.ini
# The prod VM's host key is not in the container's known_hosts; for this
# lab setup we skip host-key checking rather than pre-seeding it.
host_key_checking = False
interpreter_python = auto_silent
retry_files_enabled = False

[ssh_connection]
pipelining = True
